version: "3.9"

services:
  app:
    build: .
    container_name: personal-app
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - app_data:/app/data
      - app_logs:/app/logs
    environment:
      - SITE_URL=https://your-domain.com
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Optional NGINX reverse proxy — uncomment for production HTTPS
  # nginx:
  #   image: nginx:alpine
  #   container_name: nginx-proxy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./nginx.conf:/etc/nginx/nginx.conf:ro
  #     - ./data/certbot/conf:/etc/letsencrypt:ro
  #     - ./data/certbot/www:/var/www/certbot:ro
  #   depends_on:
  #     - app

volumes:
  app_data:
  app_logs:
