{% extends "base.html" %}
{% block title %}استعادة كلمة المرور - {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-key display-4 text-primary"></i>
          <h3 class="mt-2">استعادة كلمة المرور</h3>
          <p class="text-secondary">أدخل بريدك الإلكتروني لاستلام رابط إعادة تعيين كلمة المرور</p>
        </div>

        <form id="forgotForm">
          <div class="mb-3">
            <label for="email" class="form-label">البريد الإلكتروني</label>
            <input type="email" class="form-control" id="email" required autocomplete="email">
          </div>
          <div id="forgotError" class="alert alert-danger d-none"></div>
          <div id="forgotSuccess" class="alert alert-success d-none"></div>
          <button type="submit" class="btn btn-primary w-100" id="forgotBtn">
            <span id="forgotBtnText">إرسال رابط الاستعادة</span>
            <span id="forgotBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
          </button>
        </form>

        <div class="text-center mt-3">
          <a href="/login" class="text-decoration-none small"><i class="bi bi-arrow-right ms-1"></i>العودة لتسجيل الدخول</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('forgotForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('forgotBtn');
  const btnText = document.getElementById('forgotBtnText');
  const spinner = document.getElementById('forgotBtnSpinner');
  const errorEl = document.getElementById('forgotError');
  const successEl = document.getElementById('forgotSuccess');
  btn.disabled = true;
  btnText.textContent = 'جاري الإرسال...';
  spinner.classList.remove('d-none');
  errorEl.classList.add('d-none');
  successEl.classList.add('d-none');
  try {
    const res = await fetch('/auth/forgot-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: document.getElementById('email').value })
    });
    const data = await res.json();
    successEl.textContent = data.message || 'إذا كان البريد موجوداً، تم إرسال رابط الاستعادة.';
    successEl.classList.remove('d-none');
    document.getElementById('email').value = '';
  } catch (err) {
    errorEl.textContent = 'خطأ في الشبكة. حاول مرة أخرى.';
    errorEl.classList.remove('d-none');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'إرسال رابط الاستعادة';
    spinner.classList.add('d-none');
  }
});
</script>
{% endblock %}
