{% extends "base.html" %}
{% block title %}إعادة تعيين كلمة المرور - {{ APP_NAME }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5 col-lg-4">
    <div class="card shadow">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <i class="bi bi-shield-lock display-4 text-primary"></i>
          <h3 class="mt-2">إعادة تعيين كلمة المرور</h3>
          <p class="text-secondary">اختر كلمة مرور جديدة لحسابك</p>
        </div>

        <form id="resetForm">
          <input type="hidden" id="token" value="{{ token }}">
          <div class="mb-3">
            <label for="newPassword" class="form-label">كلمة المرور الجديدة</label>
            <input type="password" class="form-control" id="newPassword" required minlength="8" autocomplete="new-password">
            <div class="form-text">على الأقل 8 أحرف.</div>
          </div>
          <div class="mb-3">
            <label for="confirmPassword" class="form-label">تأكيد كلمة المرور الجديدة</label>
            <input type="password" class="form-control" id="confirmPassword" required autocomplete="new-password">
          </div>
          <div id="resetError" class="alert alert-danger d-none"></div>
          <div id="resetSuccess" class="alert alert-success d-none"></div>
          <button type="submit" class="btn btn-primary w-100" id="resetBtn">
            <span id="resetBtnText">إعادة تعيين</span>
            <span id="resetBtnSpinner" class="spinner-border spinner-border-sm d-none" role="status"></span>
          </button>
        </form>

        <div class="text-center mt-3">
          <a href="/login" class="text-decoration-none small"><i class="bi bi-arrow-right ms-1"></i>العودة لتسجيل الدخول</a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
{% block scripts %}
<script>
document.getElementById('resetForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('resetBtn');
  const btnText = document.getElementById('resetBtnText');
  const spinner = document.getElementById('resetBtnSpinner');
  const errorEl = document.getElementById('resetError');
  const successEl = document.getElementById('resetSuccess');
  const password = document.getElementById('newPassword').value;
  const confirm = document.getElementById('confirmPassword').value;
  if (password !== confirm) {
    errorEl.textContent = 'كلمتا المرور غير متطابقتين.';
    errorEl.classList.remove('d-none');
    return;
  }
  btn.disabled = true;
  btnText.textContent = 'جاري التعيين...';
  spinner.classList.remove('d-none');
  errorEl.classList.add('d-none');
  successEl.classList.add('d-none');
  try {
    const res = await fetch('/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        token: document.getElementById('token').value,
        new_password: password
      })
    });
    if (res.ok) {
      successEl.textContent = 'تم إعادة تعيين كلمة المرور بنجاح! جاري تحويلك إلى صفحة تسجيل الدخول...';
      successEl.classList.remove('d-none');
      setTimeout(() => window.location.href = '/login', 2000);
    } else {
      const data = await res.json();
      errorEl.textContent = data.detail || 'فشلت عملية إعادة التعيين';
      errorEl.classList.remove('d-none');
    }
  } catch (err) {
    errorEl.textContent = 'خطأ في الشبكة. حاول مرة أخرى.';
    errorEl.classList.remove('d-none');
  } finally {
    btn.disabled = false;
    btnText.textContent = 'إعادة تعيين';
    spinner.classList.add('d-none');
  }
});
</script>
{% endblock %}
